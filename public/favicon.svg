<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="45" fill="none" stroke="#00ffff" stroke-width="2" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="#00ffff" stroke-width="1.5" stroke-dasharray="2,2" />
  <circle cx="50" cy="50" r="15" fill="none" stroke="#00ffff" stroke-width="1" stroke-dasharray="1,1" />
  <line x1="50" y1="50" x2="50" y2="5" stroke="#00ffff" stroke-width="2">
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite" />
  </line>
  <circle cx="50" cy="50" r="4" fill="#00ffff" />
</svg>
