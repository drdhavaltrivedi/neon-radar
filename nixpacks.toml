[variables]
# Tell Nixpacks to treat the build environment as development 
# so it installs all required build tools (Vite, Tailwind native bindings)
NODE_ENV = "development"

[phases.install]
# Force NPM to install everything, including architecture-specific optional bindings
cmds = ["npm install --include=optional"]

[phases.build]
cmds = ["npm run build"]

[start]
# Explicitly set production environment for runtime
cmd = "NODE_ENV=production npm run start"
